site_name: Shrd
site_description: A Django-native component framework with props, state, slots, and scoped styles.
site_url: https://kurtisrogers.github.io/Shard/
repo_url: https://github.com/kurtisrogers/Shard
repo_name: kurtisrogers/Shard
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - getting-started/installation.md
      - getting-started/quickstart.md
      - getting-started/project-setup.md
  - Core concepts:
      - concepts/philosophy.md
      - concepts/components.md
      - concepts/props.md
      - concepts/state.md
      - concepts/slots.md
      - concepts/styles.md
  - Interactivity:
      - interactivity/actions.md
      - interactivity/htmx.md
      - interactivity/alpine.md
      - interactivity/events.md
  - Guides:
      - guides/htmx-and-alpine.md
      - guides/composition.md
      - guides/view-data.md
      - guides/computed-values.md
      - guides/lifecycle-hooks.md
      - guides/nested-components.md
      - guides/performance.md
      - guides/testing.md
  - Reference:
      - reference/template-tags.md
      - reference/settings.md
      - reference/api.md
      - reference/cli.md
  - Examples: examples.md
  - Project:
      - roadmap.md
      - security.md
      - RELEASING.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kurtisrogers/Shard
